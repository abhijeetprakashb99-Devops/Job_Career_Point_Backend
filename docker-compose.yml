version: '3.8'
services:
  app:
    build: .
    image: jobcareer:latest
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-default-secret}
      - MYSQL_URL=${MYSQL_URL}
    depends_on: []

  # Example MySQL service for local testing (optional)
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobcareer
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
