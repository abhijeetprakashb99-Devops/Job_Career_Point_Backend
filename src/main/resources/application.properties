# ================================
# Server
# ================================
server.port=8080

# ================================
# MySQL Database
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/job_career_point?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ================================
# JWT
# ================================
app.jwt.secret=job_career_point_secret_key_must_be_32_chars_minimum_2024
app.jwt.expiration=86400000

# ================================
# CORS - React dev server
# ================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ================================
# Logging
# ================================
logging.level.com.jobcareer=DEBUG
logging.level.org.springframework.security=INFO