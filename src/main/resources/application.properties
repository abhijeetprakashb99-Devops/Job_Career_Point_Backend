# ================================
# Server
# ================================
server.port=${PORT:8080}

# ================================
# MySQL Database
# ================================
### Datasource: prefer full JDBC URL via `MYSQL_URL` or `JDBC_DATABASE_URL`.
### If not provided, fall back to in-memory H2 for quick testing.
spring.datasource.url=${JDBC_DATABASE_URL:${MYSQL_URL:jdbc:h2:mem:testdb}}
spring.datasource.username=${MYSQLUSER:${MYSQL_USER:sa}}
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD:}}
# Do not hardcode driver-class-name so Spring Boot can auto-detect (MySQL vs H2)

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ================================
# JWT
# ================================
app.jwt.secret=${JWT_SECRET:dev-default-secret}
app.jwt.expiration=86400000

# ================================
# CORS  ? FIX: reads from Railway env variable
# ================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ================================
# Logging
# ================================
logging.level.com.jobcareer=INFO
logging.level.org.springframework.security=INFO