# ================================
# Server
# ================================
server.port=${PORT:8080}

# ================================
# MySQL Database
# ================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ================================
# JWT
# ================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ================================
# CORS  ? FIX: reads from Railway env variable
# ================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ================================
# Logging
# ================================
logging.level.com.jobcareer=INFO
logging.level.org.springframework.security=INFO